# Trellis Configuration
# Project-level settings for the Trellis workflow system
#
# All values have sensible defaults. Only override what you need.

#-------------------------------------------------------------------------------
# Session Recording
#-------------------------------------------------------------------------------

# Commit message used when auto-committing session-index changes
# after running add_session.py (journal files are retired)
session_commit_message: "chore: record session index"

#-------------------------------------------------------------------------------
# Session Auto-Commit
#-------------------------------------------------------------------------------

# Auto-commit behavior for session-index + task archive operations.
# - true (default): scripts auto-stage and auto-commit index / task changes
#   after add_session.py / task.py archive runs.
# - false: scripts do not touch git. Files (index.md, task archive moves)
#   are still written to disk; you decide whether to git add / commit.
#
# Use `false` if your project's .gitignore intentionally excludes `.trellis/`
# and you want session data kept local-only, or if you prefer to review
# staged changes manually before each commit.
#
# Accepts: true / false / yes / no / 1 / 0 / on / off (case-insensitive).
#
session_auto_commit: false

#-------------------------------------------------------------------------------
# Task Lifecycle Hooks
#-------------------------------------------------------------------------------

# Shell commands to run after task lifecycle events.
# Each hook receives TASK_JSON_PATH environment variable pointing to task.json.
# Hook failures print a warning but do not block the main operation.
#
# hooks:
#   after_create:
#     - "echo 'Task created'"
#   after_start:
#     - "echo 'Task started'"
#   after_finish:
#     - "echo 'Task finished'"
#   after_archive:
#     - "echo 'Task archived'"

# Write-time memory maintenance nudge (fail-open; archive is the natural
# "session wrapping up" moment):
hooks:
  after_archive:
    - "echo '[memory] task archived - write-time maintenance: sweep .trellis/workspace/<dev>/memory.md (drop expired entries, log new durable facts, keep under ~3000 chars)'"
    - "echo '[knowledge] milestone check: parent wrapped or major decision made? cross-project takeaways go to the vault (vault-deposit / trellis-harvest); friction entries stay in friction.md for the next sweep'"


#-------------------------------------------------------------------------------
# Monorepo / Packages
#-------------------------------------------------------------------------------

# Declare packages for monorepo projects.
# Trellis auto-detects workspaces during `trellis init`, but you can also
# configure them manually here.
#
# packages:
#   frontend:
#     path: packages/frontend
#   backend:
#     path: packages/backend
#   docs:
#     path: docs-site
#     type: submodule
#   # For polyrepo / meta-repo layouts (independent .git in each subdir),
#   # mark the package with `git: true`. The runtime treats it as an
#   # independent repository for things like git-context display.
#   webapp:
#     path: ./webapp
#     git: true

# Default package used when --package is not specified.
# default_package: frontend

#-------------------------------------------------------------------------------
# Channel worker OOM guard
#-------------------------------------------------------------------------------
# Default safeguards for `trellis channel spawn` workers. The guard runs
# at spawn time (cleans expired idle workers, then enforces the live-worker
# budget) and inside each supervisor (self-terminates a worker that stays
# continuously idle past `idle_timeout`).
#
# Precedence: CLI flag > env var (TRELLIS_CHANNEL_WORKER_IDLE_TIMEOUT /
# TRELLIS_CHANNEL_MAX_LIVE_WORKERS) > this config > built-in default.
#
# `idle_timeout: 0` disables idle cleanup (workers can sit idle forever
# unless explicitly killed or given `--timeout`).
# `max_live_workers: 0` disables the spawn-time budget check.
#
channel:
  worker_guard:
    idle_timeout: 5m
    max_live_workers: 6

#-------------------------------------------------------------------------------
# Codex (dispatch behavior)
#-------------------------------------------------------------------------------
# Codex-only knob; other platforms ignore it. Rendered default is
# "sub-agent": Codex multi-agent is stable, .codex/agents/trellis-*.toml
# definitions ship with this skeleton, and the PreToolUse spawn_agent hook
# (inject-subagent-context) rewrites each dispatch with file-backed task
# context, so child agents do not rely on parent-session state. The main
# agent spawns trellis-implement / trellis-check / trellis-research and
# passes `Active task: <path>` first. Set to "inline" to fall back to the
# main session editing directly (also the resolver's fallback when this
# key is absent or invalid).
#
codex:
  dispatch_mode: sub-agent  # or "inline" for main-session-direct editing
